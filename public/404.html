<!DOCTYPE html>

    <meta charset="utf-8" />
    <title>容斥原理 - 数学动画教学</title>

      // SPA fallback: redirect to index.html preserving the path
      var path = window.location.pathname.replace('/math-animation', '');

        window.location.replace('/math-animation/');
      }
    </script>
  </head>
