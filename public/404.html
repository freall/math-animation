<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>容斥原理 - 数学动画教学</title>
    <script>
      // SPA fallback: redirect to index.html preserving the path
      var pathname = window.location.pathname;
      var isProjectPath = pathname.indexOf('/math-animation/') === 0;
      var base = isProjectPath ? '/math-animation/' : '/';
      var normalized = isProjectPath ? pathname.replace('/math-animation', '') : pathname;
      if (normalized !== '/' && !normalized.match(/\.\w+$/)) {
        window.location.replace(base);
      }
    </script>
  </head>
  <body></body>
</html>
